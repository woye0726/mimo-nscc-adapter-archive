name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: publish-${{ needs.release.outputs.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: rm -rf dist && mkdir -p dist && npm run package

      - name: Locate VSIX
        id: vsix
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/*.vsix)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one VSIX in dist, found ${#files[@]}" >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi
          echo "path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        run: npm exec -- vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: ${{ steps.vsix.outputs.path }}
          fail_on_unmatched_files: true

      - name: Show release info
        run: |
          echo "Released ${{ needs.release.outputs.tag_name }}"